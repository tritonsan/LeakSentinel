name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-hosted.txt

      - name: Run tests
        run: pytest -q tests

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block committed .env
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo ".env is tracked in git. Move secrets to Secrets Manager/SSM and remove .env from history."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install static security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Bandit high-severity scan
        run: bandit -q -r leaksentinel services/api -x tests -ll

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
